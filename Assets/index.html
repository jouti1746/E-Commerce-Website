<!DOCTYPE html>

<head>

            </svg>
          </div>
          <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
            <li>
              <a href="/" class="">Home</a>
            </li>
            <li>
              <a href="./products.html" class="">Products</a>
            </li>
            <li>

            <a href="/" class="btn btn-outline btn-primary">Home</a>
          </li>
          <li>

          </li>
          <li>
            <a href="" class="btn btn-outline btn-primary">About</a>

          background-image: url(./mission-restart-a6/Assets/banner-image.png);
        ">
      <div class="hero-overlay"></div>
      <div>
        <h1 class="text-white text-6xl font-bold">Best Collection For You</h1>
        <p class="text-white text-2xl py-5 font-medium">
          Discover The Latest Trends In fashion, electronics and more. Shop
